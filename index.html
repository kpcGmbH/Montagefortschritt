function itemKey(pos){ return (PID||'')+''+pos; }

async function msalInit(){
  msalApp = new msal.PublicClientApplication({
    auth: {
      clientId: MS_CONFIG.clientId,
      authority: 'https://login.microsoftonline.com/' + MS_CONFIG.tenantId,
      // volle App-URL (ohne index.html) -> funktioniert auch unter Unterpfaden wie /repo/ (GitHub Pages)
      redirectUri: (window.location.origin + window.location.pathname).replace(/index\.html$/, '')
    },
    cache: { cacheLocation: 'localStorage' }
  });
  if(typeof msalApp.initialize === 'function') await msalApp.initialize();
  const resp = await msalApp.handleRedirectPromise();
  if(resp && resp.account) msalAccount = resp.account;
  if(!msalAccount){
    const accs = msalApp.getAllAccounts();
    if(accs.length) msalAccount = accs[0];
  }
  if(msalAccount) msalApp.setActiveAccount(msalAccount);
  return msalAccount;
}

async function msalLogin(){
  if(!msalApp){
    if(typeof msal === 'undefined') throw new Error('MSAL-Bibliothek nicht geladen (Internet/CDN prüfen)');
    await msalInit();
  }
  if(USE_REDIRECT){
    // navigiert weg; Rückkehr wird in msalInit()/handleRedirectPromise verarbeitet
    await msalApp.loginRedirect({ scopes: GRAPH_SCOPES });
    return null;
  }
  const res = await msalApp.loginPopup({ scopes: GRAPH_SCOPES, prompt: 'select_account' });
  msalAccount = res.account;
  msalApp.setActiveAccount(msalAccount);
  return msalAccount;
}

async function getToken(){
  try{
    const res = await msalApp.acquireTokenSilent({ scopes: GRAPH_SCOPES, account: msalAccount });
    return res.accessToken;
  }catch(e){
    if(USE_REDIRECT){ await msalApp.acquireTokenRedirect({ scopes: GRAPH_SCOPES }); throw e; }
    const res = await msalApp.acquireTokenPopup({ scopes: GRAPH_SCOPES });
    msalAccount = res.account;
    return res.accessToken;
  }
}

async function graph(path, opts){
  opts = opts || {};
  const token = await getToken();
  const headers = Object.assign({ 'Authorization': 'Bearer ' + token }, opts.headers || {});
  const res = await fetch(GRAPH + path, Object.assign({}, opts, { headers }));
  if(!res.ok){ const t = await res.text(); throw new Error('Graph '+res.status+': '+t.substring(0,300)); }
  return res;
}

async function resolveIds(){
  const site = await (await graph('/sites/' + MS_CONFIG.spHost + ':' + MS_CONFIG.sitePath)).json();
  SPIDS.siteId = site.id;
  const lists = await (await graph('/sites/' + SPIDS.siteId + '/lists?$filter=' +
    encodeURIComponent("displayName eq '" + MS_CONFIG.listName + "'"))).json();
  if(!lists.value || !lists.value.length) throw new Error('Liste "'+MS_CONFIG.listName+'" nicht gefunden');
  SPIDS.listId = lists.value[0].id;
  const drives = await (await graph('/sites/' + SPIDS.siteId + '/drives')).json();
  const drive = (drives.value||[]).find(d => d.name === MS_CONFIG.libName) || (drives.value||[])[0];
  if(!drive) throw new Error('Bibliothek "'+MS_CONFIG.libName+'" nicht gefunden');
  SPIDS.driveId = drive.id;
}

// ---- Liste (Positionen): laden + upsert ----
async function spListLoadRows(){
  const rows = [];
  // Alle Items laden, clientseitig nach Projekt filtern (robust gegen nicht-indizierte Spalten)
  let url = '/sites/'+SPIDS.siteId+'/lists/'+SPIDS.listId+'/items?$expand=fields&$top=2000';
  while(url){
    const data = await (await graph(url)).json();
    (data.value||[]).forEach(it => {
      const f = it.fields || {};
      if(!f.pos) return;
      if(PID && (f.projekt||'')!==PID) return;   // nur Items des aktuellen Projekts
      ITEMID[itemKey(f.pos)] = it.id;
      let row = {};
      try{ row = f.data ? JSON.parse(f.data) : {}; }catch(e){ row = {}; }
      row.pos = f.pos;
      row.updated_at = it.lastModifiedDateTime || null;
      rows.push(row);
    });
    url = data['@odata.nextLink'] ? data['@odata.nextLink'].replace(GRAPH,'') : null;
  }
  return rows;
}

function buildPosData(pos){
  // Synthetische Etagen-Zeile (Anlagen-/Übersichtsfotos je Geschoss) – eigene Struktur
  if(isEKey(pos)){ const e=gsE(pos); return JSON.stringify({__etage:true, efotos:e.efotos||[], restarbeiten:e.restarbeiten||[]}); }
  const s = gs(pos);
  // gleiche Struktur wie früher die Supabase-Spalten (innere Felder als JSON-Strings)
  return JSON.stringify({
    g:s.g, m:s.m, a:s.a, sa:s.sa, dp:s.dp, ea:s.ea, ib:s.ib, ew:s.ew,
    note:s.note,
    fotos: JSON.stringify(s.fotos),
    pdfs: JSON.stringify(s.pdfs||[]),
    restarbeiten: JSON.stringify(s.restarbeiten||[]),
    ts: JSON.stringify(s.ts||{}),
    usr: JSON.stringify(s.by||{})
  });
}

async function spListWrite(pos){
  if(!SPIDS.listId || !PID) return;
  const fields = { pos: pos, projekt: PID, data: buildPosData(pos) };
  const id = ITEMID[itemKey(pos)];
  if(id){
    await graph('/sites/'+SPIDS.siteId+'/lists/'+SPIDS.listId+'/items/'+id+'/fields', {
      method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify(fields)
    });
  } else {
    const res = await graph('/sites/'+SPIDS.siteId+'/lists/'+SPIDS.listId+'/items', {
      method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ fields })
    });
    const created = await res.json();
    ITEMID[itemKey(pos)] = created.id;
  }
  updLastEdit(new Date().toISOString());
}

// ---- Storage (Fotos-Bibliothek) ----
// Pfad pro Segment encodieren (Schrägstriche als Ordnertrenner erhalten)
function encPath(p){ return String(p).split('/').map(encodeURIComponent).join('/'); }
// Ordnernamen säubern (SharePoint-unzulässige Zeichen entfernen)
function safeName(s){ return String(s==null?'':s).replace(/[\\/:*?"<>|#%]/g,'-').replace(/\s+/g,' ').trim().replace(/[. ]+$/,'').slice(0,80) || '_'; }
// Zielordner für eine Position: Baustelle / Etage / Anlage
function folderFor(pos){
  for(const sec of DATA){ for(const sub of sec.subsections){ if(sub.items.some(i=>i.pos===pos)){
    return [safeName(curProjName()), safeName(sec.label||sec.pos), safeName(sub.bez||sub.pos)].join('/');
  }}}
  return safeName(curProjName());
}
// Ordnerpfad anlegen (idempotent; je Ebene, vorhandene werden übersprungen)
async function ensureFolder(path){
  const segs=String(path).split('/').filter(Boolean); let parent='';
  for(const seg of segs){
    const base='/sites/'+SPIDS.siteId+'/drives/'+SPIDS.driveId;
    const ep = parent ? base+'/root:/'+encPath(parent)+':/children' : base+'/root/children';
    try{
      await graph(ep, {method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({name:seg, folder:{}, '@microsoft.graph.conflictBehavior':'fail'})});
    }catch(e){ if(!/409|nameAlreadyExists|already exists/i.test((e&&e.message)||'')) console.warn('Ordner anlegen ('+seg+'):',(e&&e.message)||e); }
    parent = parent ? parent+'/'+seg : seg;
  }
}
async function spUpload(fname, body, contentType){
  const i=fname.lastIndexOf('/');
  if(i>0) await ensureFolder(fname.slice(0,i));
  await graph('/sites/'+SPIDS.siteId+'/drives/'+SPIDS.driveId+'/root:/'+encPath(fname)+':/content', {
    method:'PUT', headers:{'Content-Type': contentType||'application/octet-stream'}, body: body
  });
  return fname;
}
async function spDownloadBlob(fname){
  // Metadaten holen -> vor-authentifizierte downloadUrl (CORS-fähig, ohne Token)
  const meta = await (await graph('/sites/'+SPIDS.siteId+'/drives/'+SPIDS.driveId+'/root:/'+encPath(fname))).json();
  const dl = meta['@microsoft.graph.downloadUrl'];
  if(!dl) throw new Error('downloadUrl fehlt');
  const res = await fetch(dl);
  if(!res.ok) throw new Error('Download '+res.status);
  return await res.blob();
}
async function spDelete(fname){
  try{
    await graph('/sites/'+SPIDS.siteId+'/drives/'+SPIDS.driveId+'/root:/'+encPath(fname), { method:'DELETE' });
  }catch(e){ console.warn('Datei löschen fehlgeschlagen:', e.message); }
}
// Datei in Zielordner verschieben (für Migration). Gibt true zurück, auch wenn schon verschoben.
async function spMove(oldRef, newRef){
  const folder=newRef.slice(0,newRef.lastIndexOf('/'));
  const name=newRef.slice(newRef.lastIndexOf('/')+1);
  await ensureFolder(folder);
  const base='/sites/'+SPIDS.siteId+'/drives/'+SPIDS.driveId;
  let src;
  try{ src = await (await graph(base+'/root:/'+encPath(oldRef))).json(); }
  catch(e){
    // evtl. bereits verschoben -> prüfe Ziel
    try{ await graph(base+'/root:/'+encPath(newRef)); return true; }catch(e2){ throw e; }
  }
  const fmeta = await (await graph(base+'/root:/'+encPath(folder))).json();
  await graph(base+'/items/'+src.id, {method:'PATCH', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({parentReference:{id:fmeta.id}, name:name})});
  return true;
}

async function loadState() {
  showLoader('Daten werden geladen...');
  try {
    const data = await spListLoadRows();
    if (data) {
      let newest = null;
      data.forEach(row => {
        if(row.__etage || isEKey(row.pos)){ ST[row.pos] = {__etage:true, efotos: Array.isArray(row.efotos)?row.efotos:[], restarbeiten: Array.isArray(row.restarbeiten)?row.restarbeiten:[]}; if (row.updated_at && (!newest || row.updated_at > newest)) newest = row.updated_at; return; }
        let fotos = [], pdfs = [];
        try { fotos = row.fotos ? JSON.parse(row.fotos) : []; } catch(e) {}
        try { pdfs = row.pdfs ? JSON.parse(row.pdfs) : []; } catch(e) {}
        let rest = [];
        try { rest = row.restarbeiten ? JSON.parse(row.restarbeiten) : []; } catch(e) {}
        let tsObj = {};
        try { tsObj = row.ts ? JSON.parse(row.ts) : {}; } catch(e) {}
        let byObj = {};
        try { byObj = row.usr ? JSON.parse(row.usr) : {}; } catch(e) {}
        ST[row.pos] = {
          g: row.g||false, m: row.m||false, a: row.a||false,
          sa: row.sa||false, dp: row.dp||false, ea: row.ea||false, ib: row.ib||false, ew: row.ew||false,
          note: row.note||'', fotos: fotos, pdfs: pdfs, restarbeiten: rest, ts: tsObj, by: byObj
        };
        if (row.updated_at && (!newest || row.updated_at > newest)) newest = row.updated_at;
      });
      updLastEdit(newest);
    }
    // Write-through: aktuellen Stand + Item-IDs lokal sichern (für Offline-Lesen)
    try{ await idbSet('state', PID, JSON.parse(JSON.stringify(ST))); }catch(e){}
    await persistItemIds(PID);
  } catch(e) {
    // Offline / Netzfehler -> letzten Stand aus dem lokalen Cache laden
    console.warn('Online-Laden fehlgeschlagen, versuche lokalen Cache:', (e&&e.message)||e);
    const cached = await idbGet('state', PID);
    if (cached) {
      Object.keys(cached).forEach(k => { ST[k] = cached[k]; });
      const ci = await idbGet('itemids', PID);
      if (ci) Object.assign(ITEMID, ci);
    }
  }
  hideLoader();
  await rebuildDirty();   // bekannte lokale Änderungen markieren …
  flushOutbox();          // … und (falls online) gleich synchronisieren
}

    document.body.appendChild(t);
  }
  t.style.background = opts.bg || 'var(--green)';
  t.textContent = msg;
  t.style.opacity = '1';

async function clearState() {

      for(const p of Object.keys(ITEMID)){
        try{ await graph('/sites/'+SPIDS.siteId+'/lists/'+SPIDS.listId+'/items/'+ITEMID[p], {method:'DELETE'}); }catch(e){}

  }
}

// Polling für Live-Updates (alle 30 Sekunden)
setInterval(async () => {
  if(!SPIDS.listId || !PID) return;
  if(!navigator.onLine) return;          // offline: kein Polling
  flushOutbox();                          // ausstehende lokale Änderungen synchronisieren
  try {
    const data = await spListLoadRows();
    if (!data) return;
    let changed = false;
    let newest = null;
    data.forEach(row => {
      if (row.updated_at && (!newest || row.updated_at > newest)) newest = row.updated_at;
      if (row.__etage || isEKey(row.pos)){ if(!DIRTY.has(row.pos) && !ST[row.pos]){ ST[row.pos]={__etage:true, efotos:Array.isArray(row.efotos)?row.efotos:[], restarbeiten:Array.isArray(row.restarbeiten)?row.restarbeiten:[]}; if(document.getElementById('RA'+sp(row.pos))) updRA(row.pos); } return; }
      if (DIRTY.has(row.pos)) return;     // lokale, noch nicht synchronisierte Änderung nicht überschreiben
      const cur = ST[row.pos];
      let newRest = cur ? cur.restarbeiten : [];
      try { if(row.restarbeiten) newRest = JSON.parse(row.restarbeiten); } catch(e) {}
      const restChanged = JSON.stringify(cur?cur.restarbeiten:[])!==JSON.stringify(newRest);
      let newTs = cur ? (cur.ts||{}) : {};
      try { if(row.ts) newTs = JSON.parse(row.ts); } catch(e) {}
      let newBy = cur ? (cur.by||{}) : {};
      try { if(row.usr) newBy = JSON.parse(row.usr); } catch(e) {}
      const tsChanged = JSON.stringify(cur?(cur.ts||{}):{})!==JSON.stringify(newTs);
      if (!cur || cur.g!==row.g || cur.m!==row.m || cur.a!==row.a ||
          cur.sa!==row.sa || cur.dp!==row.dp || cur.ea!==row.ea || cur.ib!==row.ib || cur.ew!==row.ew || cur.note!==row.note || restChanged || tsChanged) {
        let pdfs = cur ? cur.pdfs : [];
        try { if(row.pdfs) pdfs = JSON.parse(row.pdfs); } catch(e) {}
        ST[row.pos] = { g:row.g||false, m:row.m||false, a:row.a||false,
          sa:row.sa||false, dp:row.dp||false, ea:row.ea||false, ib:row.ib||false, ew:row.ew||false,
          note:row.note||'', fotos:cur?cur.fotos:[], pdfs:pdfs, restarbeiten:newRest, ts:newTs, by:newBy };
        changed = true;
        const id = row.pos.replace(/\./g,'_');
        const fields = ['g','m','a','sa','dp','ea','ib','ew'];
        fields.forEach(f => {
          const el = document.getElementById('K'+f+id);
          if(el) { el.classList.toggle('on', ST[row.pos][f]); el.querySelector('.cki').innerHTML = ST[row.pos][f]?'&#10003;':'&#9675;'; }
          const tsEl = document.getElementById('T'+f+id);
          if(tsEl) tsEl.textContent = (ST[row.pos][f] && ST[row.pos].ts && ST[row.pos].ts[f]) ? tsFmt(ST[row.pos].ts[f]) : '';
        });
        const card = document.getElementById('C'+id);
        const st = ist(row.pos, TF);
        if(card) card.className = 'card'+(st!=='open'?' '+st:'');
        const anm = card ? card.querySelector('.anm') : null;
        if(anm && anm !== document.activeElement) anm.value = ST[row.pos].note;
        updProg(row.pos);
        // Restarbeiten nur rendern wenn diese Karte nicht gerade fokussiert ist
        if(restChanged){
          const card2 = document.getElementById('C'+row.pos.replace(/\./g,'_'));
          const tippt = card2 && card2.contains(document.activeElement);
          if(!tippt) updRA(row.pos);
        }
      }
    });
    updLastEdit(newest);
    if(changed) { upStats(); /* restoreUI nicht nötig - UI wird im Polling direkt aktualisiert */ }
  } catch(e) {}
}, 30000);

async function ibnReceive(p){

  if(!PID){ alert('IBN-Protokoll empfangen, aber es ist keine Baustelle geöffnet. Bitte Baustelle öffnen – das Protokoll wird dann automatisch übernommen.'); _ibnSeen.delete(p.id); return; }

    const base=protoDir(type,pos)+'/'+pos.replace(/\./g,'_')+'_'+type.replace(/ /g,'_')+'_'+ts;
    const fname=base+'.pdf';
    await queueUpload(fname, _dataURLtoBlob(p.pdf), 'application/pdf', pos);

        if(old.dataFname){removeQueuedFile(old.dataFname);spDelete(old.dataFname);} } }
    if(!replaced) gs(pos).pdfs.push(entry);

    showToast('✓ '+type+' bei Position '+pos+(replaced?' aktualisiert':' abgelegt'));
  }catch(e){ alert('IBN-Protokoll konnte nicht abgelegt werden: '+((e&&e.message)||e)); }
}

  }

function attachInk(ink){
  const ctx=ink.getContext('2d');
  let drawing=false,lastX=0,lastY=0;
  function getXY(e){
    const r=ink.getBoundingClientRect();
    return [(e.clientX-r.left)*(ink.width/r.width), (e.clientY-r.top)*(ink.height/r.height)];
  }
  // TEXT-TOOL: erstellt Textarea-Overlay, beim Bestätigen wird Text aufs Canvas gezeichnet
  function startText(e){
    e.preventDefault();
    if(window._activeTextInput){
      try { window._activeTextInput.blur(); } catch(err){}
    }
    const r=ink.getBoundingClientRect();
    const wrap = ink.parentElement;
    const wrapRect = wrap.getBoundingClientRect();
    const [cx, cy] = getXY(e); // Canvas-Koordinaten
    const scale = ink.width / r.width; // Display→Canvas Faktor
    
    const ta = document.createElement('textarea');
    ta.className = 'pdfed-textinput';
    ta.placeholder = 'Tippen ...';
    ta.rows = 1;
    ta.style.left = (e.clientX - wrapRect.left) + 'px';
    ta.style.top  = (e.clientY - wrapRect.top - 4) + 'px';
    ta._cx = cx; ta._cy = cy; ta._scale = scale;
    wrap.appendChild(ta);
    window._activeTextInput = ta;
    
    // Mobile Tastatur sicher öffnen
    setTimeout(() => { ta.focus(); ta.click(); }, 50);
    
    ta.addEventListener('input', () => {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
      // Breite mit Inhalt wachsen
      const len = Math.max(...ta.value.split('\n').map(l => l.length));
      ta.style.width = Math.max(200, Math.min(500, len * 11 + 30)) + 'px';
    });
    
    let finalized = false;
    function finalize(){
      if(finalized) return; finalized = true;
      const text = ta.value;
      const x = ta._cx, y = ta._cy, sc = ta._scale;
      
      if(text.trim()){
        // Text aufs Canvas zeichnen (Canvas-Auflösung berücksichtigen)
        const fontSize = 18 * sc;
        ctx.save();
        ctx.fillStyle = '#000';
        ctx.font = fontSize + 'px -apple-system, BlinkMacSystemFont, Arial, sans-serif';
        ctx.textBaseline = 'top';
        const lines = text.split('\n');
        const lineHeight = fontSize * 1.3;
        lines.forEach((line, idx) => {
          if(line) ctx.fillText(line, x, y + idx * lineHeight);
        });
        ctx.restore();
        EDDIRTY = true;
      }
      
      ta.remove();
      if(window._activeTextInput === ta) window._activeTextInput = null;
    }
    
    ta.addEventListener('blur', finalize);
    ta.addEventListener('keydown', (ev) => {
      if(ev.key === 'Enter' && !ev.shiftKey && !ev.ctrlKey){
        ev.preventDefault(); finalize();
      } else if(ev.key === 'Escape'){
        ev.preventDefault();
        ta.value = ''; finalize();
      }
    });
  }
  function eraseAt(x,y){
    // Fill circle at point - works for single tap
    ctx.save();
    ctx.globalCompositeOperation='destination-out';
    ctx.fillStyle='rgba(0,0,0,1)';
    ctx.beginPath();
    ctx.arc(x,y,40,0,2*Math.PI);
    ctx.fill();
    ctx.restore();
  }
  function eraseLine(x1,y1,x2,y2){
    // Stroke line between points - no gaps when wiping fast
    ctx.save();
    ctx.globalCompositeOperation='destination-out';
    ctx.strokeStyle='rgba(0,0,0,1)';
    ctx.lineWidth=80;
    ctx.lineCap='round';
    ctx.lineJoin='round';
    ctx.beginPath();
    ctx.moveTo(x1,y1);
    ctx.lineTo(x2,y2);
    ctx.stroke();
    ctx.restore();
  }
  function start(e){
    if(EDTOOL==='text'){
      startText(e);
      return;
    }
    e.preventDefault();
    drawing=true;
    [lastX,lastY]=getXY(e);
    if(EDTOOL==='erase'){
      eraseAt(lastX,lastY);
      EDDIRTY=true;
    }
  }
  function move(e){
    if(!drawing)return;
    e.preventDefault();
    const [x,y]=getXY(e);
    if(EDTOOL==='erase'){
      eraseLine(lastX,lastY,x,y);
      eraseAt(x,y);
    } else {
      ctx.strokeStyle=EDCOLOR;
      ctx.fillStyle=EDCOLOR;
      ctx.lineWidth=4;
      ctx.lineCap='round';
      ctx.lineJoin='round';
      ctx.beginPath();
      ctx.moveTo(lastX,lastY);
      ctx.lineTo(x,y);
      ctx.stroke();
    }
    [lastX,lastY]=[x,y];
    EDDIRTY=true;
  }
  function end(e){drawing=false;}
  ink.addEventListener('pointerdown',start);
  ink.addEventListener('pointermove',move);
  ink.addEventListener('pointerup',end);
  ink.addEventListener('pointercancel',end);
  ink.addEventListener('pointerleave',end);
}

async function pdfSaveData(){
  if(EDPOS===null||EDIDX===null) return false;
  const p=gs(EDPOS).pdfs[EDIDX];
  if(!p) throw new Error('PDF-Eintrag nicht gefunden');
  if(!EDPAGES.length) throw new Error('PDF wurde nicht vollständig geladen');
  if(!window.jspdf) throw new Error('PDF-Bibliothek nicht geladen (Seite neu laden)');

  // Alten Dateinamen merken (für späteres Löschen)
  let oldFname = p.fname;
  if(!oldFname && p.url){
    const m = p.url.match(/\/fotos\/([^?]+)/);
    if(m) oldFname = decodeURIComponent(m[1]);
  }

  // PDF zusammenbauen
  const {jsPDF}=window.jspdf;
  let doc=null;
  EDPAGES.forEach((pg,idx)=>{
    const merge=document.createElement('canvas');
    merge.width=pg.base.width;merge.height=pg.base.height;
    const mc=merge.getContext('2d');
    mc.drawImage(pg.base,0,0);
    mc.drawImage(pg.ink,0,0);
    const imgData=merge.toDataURL('image/jpeg',0.7);
    const wmm=210, hmm=merge.height*210/merge.width;
    if(idx===0){ doc=new jsPDF({orientation:'p',unit:'mm',format:[wmm,hmm]}); }
    else { doc.addPage([wmm,hmm]); }
    doc.addImage(imgData,'JPEG',0,0,wmm,hmm);
  });
  if(!doc) throw new Error('PDF konnte nicht erstellt werden');
  const blob=doc.output('blob');

  // Strategie: NEUE Datei schreiben (INSERT, funktioniert immer)
  // Dateiname mit aktuellem Zeitstempel = niemals Konflikt
  const typeSlug = (p.type||'Protokoll').replace(/ /g,'_');
  const newFname = folderFor(EDPOS)+'/'+EDPOS.replace(/\./g,'_')+'_'+typeSlug+'_'+Date.now()+'.pdf';

  await queueUpload(newFname, blob, 'application/pdf', EDPOS);   // lokal + Warteschlange (offline-fähig)

  // Eintrag auf neue Datei zeigen lassen
  p.fname = newFname;
  saveFotos(EDPOS);
  updPG(EDPOS);

  // Alte Datei im Hintergrund löschen
  if(oldFname && oldFname !== newFname){ removeQueuedFile(oldFname); spDelete(oldFname); }
  return true;
}

async function pdfClose(){
  if(EDPOS===null || EDIDX===null){
    document.getElementById('pdfed').classList.remove('on');
    document.getElementById('pdfedPages').innerHTML='';
    EDPAGES=[];EDDIRTY=false;
    return;
  }
  // Im Viewer-Modus: einfach schließen, nichts speichern
  if(EDREADONLY){
    document.getElementById('pdfed').classList.remove('on');
    document.getElementById('pdfedPages').innerHTML='';
    EDPAGES=[];EDPOS=null;EDIDX=null;EDDIRTY=false;EDREADONLY=false;
    return;
  }
  // Sofort schließen + Speichern im Hintergrund
  // Referenzen lokal sichern (für Hintergrund-Save und Wiederöffnen bei Fehler)
  const savingPos = EDPOS;
  const savingIdx = EDIDX;
  const savingPages = EDPAGES;
  const savingTitle = document.getElementById('pdfedTitle').textContent;

  // UI sofort schließen
  document.getElementById('pdfed').classList.remove('on');
  document.getElementById('pdfedPages').innerHTML='';
  EDPAGES=[];EDPOS=null;EDIDX=null;EDDIRTY=false;

  showToast('Wird gespeichert ...', {persist:true, bg:'var(--braun)'});

  try{
    await pdfSaveDataBg(savingPos, savingIdx, savingPages);
    showToast('✓ Protokoll gespeichert');
  }catch(e){
    hideToast();
    alert('Speichern fehlgeschlagen!\n\n'+e.message+'\n\nDer Editor wird wieder geöffnet damit nichts verloren geht.');
    // Editor mit ursprünglichem Zustand wieder öffnen
    EDPOS = savingPos; EDIDX = savingIdx; EDPAGES = savingPages;
    document.getElementById('pdfedTitle').textContent = savingTitle;
    const pagesEl = document.getElementById('pdfedPages');
    pagesEl.innerHTML='';
    savingPages.forEach(pg=>{
      const wrap = document.createElement('div');
      wrap.className = 'pdfed-pg';
      const maxW = Math.min(window.innerWidth-28, 900);
      const dispScale = maxW/pg.base.width;
      pg.base.style.width = pg.ink.style.width = (pg.base.width*dispScale)+'px';
      pg.base.style.height = pg.ink.style.height = (pg.base.height*dispScale)+'px';
      wrap.appendChild(pg.base); wrap.appendChild(pg.ink);
      pagesEl.appendChild(wrap);
      attachInk(pg.ink);
    });
    document.getElementById('pdfed').classList.add('on');
  }
}

// Hintergrund-Speichern mit lokalen Referenzen (race-frei)
async function pdfSaveDataBg(pos, idx, pages){
  if(pos===null||idx===null) return false;
  const p=gs(pos).pdfs[idx];
  if(!p) throw new Error('PDF-Eintrag nicht gefunden');
  if(!pages.length) throw new Error('PDF wurde nicht vollständig geladen');
  if(!window.jspdf) throw new Error('PDF-Bibliothek nicht geladen (Seite neu laden)');

  let oldFname = p.fname;
  if(!oldFname && p.url){
    const m = p.url.match(/\/fotos\/([^?]+)/);
    if(m) oldFname = decodeURIComponent(m[1]);
  }

  const {jsPDF}=window.jspdf;
  let doc=null;
  pages.forEach((pg,i)=>{
    const merge=document.createElement('canvas');
    merge.width=pg.base.width;merge.height=pg.base.height;
    const mc=merge.getContext('2d');
    mc.drawImage(pg.base,0,0);
    mc.drawImage(pg.ink,0,0);
    const imgData=merge.toDataURL('image/jpeg',0.7);
    const wmm=210, hmm=merge.height*210/merge.width;
    if(i===0){ doc=new jsPDF({orientation:'p',unit:'mm',format:[wmm,hmm]}); }
    else { doc.addPage([wmm,hmm]); }
    doc.addImage(imgData,'JPEG',0,0,wmm,hmm);
  });
  if(!doc) throw new Error('PDF konnte nicht erstellt werden');
  const blob=doc.output('blob');

  const typeSlug = (p.type||'Protokoll').replace(/ /g,'_');
  const newFname = folderFor(pos)+'/'+pos.replace(/\./g,'_')+'_'+typeSlug+'_'+Date.now()+'.pdf';

  await queueUpload(newFname, blob, 'application/pdf', pos);   // lokal + Warteschlange (offline-fähig)

  p.fname = newFname;
  saveFotos(pos);
  updPG(pos);

  if(oldFname && oldFname !== newFname){ removeQueuedFile(oldFname); spDelete(oldFname); }
  return true;
}

          geschoss:sec.label, bereich:'Etage allgemein', pos:'–', bez:'Etagenweit',
          txt:r.txt, done:r.done, gw:r.gw||'', ersteller:r.ersteller, erstelltAm:r.erstelltAm,
          erledigtVon:r.erledigtVon, erledigtAm:r.erledigtAm,
          fotos:(r.fotos||[]).slice()
        });
      });
    }
    sec.subsections.forEach(sub=>{
      sub.items.forEach(item=>{
        const s=gs(item.pos);
        if(!s.restarbeiten||!s.restarbeiten.length)return;
        s.restarbeiten.forEach(r=>{
          raEnsure(r);
          if(!r.txt)return;
          rows.push({
            geschoss:sec.label, bereich:sub.bez, pos:item.pos, bez:item.bez.trim(),
            txt:r.txt, done:r.done, gw:r.gw||'', ersteller:r.ersteller, erstelltAm:r.erstelltAm,
            erledigtVon:r.erledigtVon, erledigtAm:r.erledigtAm,
            fotos:(r.fotos||[]).slice()
          });
        });
      });
    });
  });
  return rows;
}

// ================= MEHRPROJEKT + STÜCKLISTEN-IMPORT =================
const SEED_DATA = DATA;                 // eingebettete Berlin-Upbeat-LV als Startwert
const LEGACY_PID = 'berlin-upbeat';
const LEGACY_NAME = 'Berlin Upbeat';
let PROJECTS = [];                       // [{pid,name,created,by}]
let PENDING_LV = null;                   // geparste LV im Import-Assistenten

function escapeHtml(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
// Name der aktuell gewählten Baustelle (für Berichte, Titel, Dateinamen)
function curProjName(){
  const p=(typeof PROJECTS!=='undefined'&&PROJECTS)?PROJECTS.find(x=>x.pid===PID):null;
  const el=document.getElementById('projName');
  return (p&&p.name) || (el&&el.textContent&&el.textContent.trim()) || 'Projekt';
}
// Kurzcode aus dem Projektnamen (z.B. "Berlin Upbeat" -> "BU") für Dok.-Nummern
function curProjCode(){
  return (curProjName().match(/\b[A-Za-zÄÖÜäöü0-9]/g)||['P']).join('').toUpperCase().slice(0,4);
}
function slugify(s){
  return String(s||'projekt').toLowerCase()
    .replace(/[ä]/g,'ae').replace(/[ö]/g,'oe').replace(/[ü]/g,'ue').replace(/ß/g,'ss')
    .replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,40) || 'projekt';
}

// ---- Projekt-Registry (als Dateien in der Fotos-Bibliothek) ----
async function spTryDownloadText(fname){
  try{ return await (await spDownloadBlob(fname)).text(); }catch(e){ return null; }
}
// Wie oben, aber: null nur bei "nicht vorhanden" (404); echte Netzfehler werden geworfen,
// damit der Offline-Lesepfad auf den lokalen Cache zurückfallen kann statt zu "leer".
async function spTryDownloadTextStrict(fname){
  try{ return await (await spDownloadBlob(fname)).text(); }
  catch(e){
    const m=((e&&e.message)||'')+'';
    if(/ 404|404:|itemnotfound/i.test(m)) return null;   // Datei gibt es (noch) nicht
    throw e;                                              // Netzfehler/offline -> weiterreichen
  }
}
async function spUploadText(fname, text){
  return spUpload(fname, new Blob([text],{type:'application/json'}), 'application/json');
}
async function loadProjects(){
  try{
    const txt = await spTryDownloadTextStrict('__projects.json');
    try{ PROJECTS = txt ? (JSON.parse(txt)||[]) : []; }catch(e){ PROJECTS = []; }
  }catch(e){
    // offline / Netzfehler -> letzten bekannten Stand aus dem lokalen Cache
    const cached = await idbGet('projects','__list');
    if(cached){ PROJECTS = cached; return; }
    throw e;
  }
  if(!PROJECTS.length){
    PROJECTS = [{pid:LEGACY_PID, name:LEGACY_NAME, created:new Date().toISOString(), by:USER||''}];
    // LV nur hochladen, wenn eine eingebettete Vorlage da ist – sonst vorhandene Datei nicht überschreiben
    if(SEED_DATA && SEED_DATA.length){ try{ await spUploadText('LV_'+LEGACY_PID+'.json', JSON.stringify(SEED_DATA)); }catch(e){} }
    try{ await saveProjects(); }catch(e){}
  }
  try{ await idbSet('projects','__list', PROJECTS); }catch(e){}   // Write-through für Offline
}
async function saveProjects(){
  // Vor dem Hochladen mit dem Server-Stand mergen: ein Gerät mit älterer
  // PROJECTS-Kopie darf Felder anderer Geräte (z.B. Auftraggeber) nicht
  // überschreiben (last writer wins über das gedrosselte touchProject).
  try{
    const txt=await spTryDownloadTextStrict('__projects.json');
    const remote=txt? (JSON.parse(txt)||[]) : [];
    const byPid={}; remote.forEach(r=>{ if(r&&r.pid) byPid[r.pid]=r; });
    PROJECTS.forEach(p=>{ const r=byPid[p.pid]; if(!r) return;
      // lokal unbekannte Felder vom Server übernehmen ('' bleibt bewusstes Leeren)
      for(const k in r){ if(p[k]===undefined||p[k]===null) p[k]=r[k]; }
      if(r.lastEdit && (!p.lastEdit || r.lastEdit>p.lastEdit)) p.lastEdit=r.lastEdit;
    });
    // nur remote vorhandene Baustellen nicht verlieren
    remote.forEach(r=>{ if(r&&r.pid&&!PROJECTS.some(x=>x.pid===r.pid)) PROJECTS.push(r); });
  }catch(e){}   // offline/Fehler -> lokalen Stand schreiben (wie bisher)
  try{ await idbSet('projects','__list', PROJECTS); }catch(e){}
  await spUploadText('__projects.json', JSON.stringify(PROJECTS));
}
// "Letzte Änderung" einer Baustelle merken (für die Auswahl-Anzeige). In den Speicher +
// lokalen Cache sofort, nach SharePoint gebündelt (gedrosselt), um Schreiblast zu sparen.
let _touchTimer=null;
function touchProject(pid, iso){
  if(!pid || typeof PROJECTS==='undefined' || !PROJECTS) return;
  const p=PROJECTS.find(x=>x.pid===pid); if(!p) return;
  const ts=iso||new Date().toISOString();
  if(p.lastEdit && p.lastEdit>=ts) return;          // nichts Neueres
  p.lastEdit=ts;
  try{ idbSet('projects','__list', PROJECTS); }catch(e){}
  clearTimeout(_touchTimer);
  _touchTimer=setTimeout(()=>{ saveProjects().catch(()=>{}); }, 5000);
}
async function loadProjectLV(pid){
  try{
    const txt = await spTryDownloadTextStrict('LV_'+pid+'.json');
    if(txt){ const lv = JSON.parse(txt); try{ await idbSet('lv', pid, lv); }catch(e){} return lv; }
  }catch(e){
    const cached = await idbGet('lv', pid);
    if(cached) return cached;
    throw e;
  }
  const cached = await idbGet('lv', pid);
  if(cached) return cached;
  if(pid===LEGACY_PID) return SEED_DATA;
  throw new Error('Stückliste für Projekt nicht gefunden');
}
async function createProject(name, lv, auftraggeber, meta){
  meta=meta||{};
  const pid = slugify(name)+'-'+Date.now();
  await spUploadText('LV_'+pid+'.json', JSON.stringify(lv));
  const _now=new Date().toISOString();
  PROJECTS.push({pid, name, nummer:(meta.nummer||'').trim(), ort:(meta.ort||'').trim(), objekt:(meta.objekt||'').trim(), auftraggeber:(auftraggeber||'').trim(), created:_now, lastEdit:_now, by:USER||''});
  await saveProjects();
  return pid;
}

// Live-Filter der Baustellenliste: alle Suchbegriffe müssen im Namen vorkommen (UND-Verknüpfung).
function filterProjects(q){
  const terms=String(q||'').trim().toLowerCase().split(/\s+/).filter(Boolean);
  const list=document.getElementById('projList'); if(!list) return;
  let shown=0;
  list.querySelectorAll('.projRow').forEach(row=>{
    const name=row.dataset.name||'';
    const hit=terms.every(t=>name.indexOf(t)>=0);
    row.style.display=hit?'flex':'none';
    if(hit) shown++;
  });
  const none=document.getElementById('projNone'); if(none) none.style.display=shown?'none':'block';
}
function switchProject(){ openProjectFlow(); }

// Auftraggeber (Stammdaten) je Baustelle setzen/ändern – wird in die Einweisungsprotokolle übernommen.
async function editAuftraggeber(pid, ev){
  if(ev){ ev.stopPropagation(); ev.preventDefault(); }
  const p = PROJECTS.find(x=>x.pid===pid);
  if(!p){ return; }
  const eingabe = prompt('Auftraggeber für „'+p.name+'":', p.auftraggeber||'');
  if(eingabe==null) return;
  const ag = eingabe.trim();
  if(ag===(p.auftraggeber||'')) return;
  const alt = p.auftraggeber||'';
  p.auftraggeber = ag;
  try{ await saveProjects(); }
  catch(e){ p.auftraggeber = alt; alert('Speichern fehlgeschlagen: '+(e.message||e)); return; }
  renderProjectPicker();
}

// Baustelle umbenennen (nur der Anzeigename; pid + LV-Datei bleiben unverändert,
// damit Fortschritt und Fotos in SharePoint erhalten bleiben).
async function renameProject(pid, ev){
  if(ev){ ev.stopPropagation(); ev.preventDefault(); }
  const p = PROJECTS.find(x=>x.pid===pid);
  if(!p){ return; }
  const eingabe = prompt('Baustelle umbenennen:', p.name);
  if(eingabe==null) return;                       // abgebrochen
  const name = eingabe.trim();
  if(!name || name===p.name) return;              // leer oder unverändert
  const alt = p.name;
  p.name = name;
  try{
    await saveProjects();
  }catch(e){
    p.name = alt;                                 // bei Fehler zurückrollen
    alert('Umbenennen fehlgeschlagen: '+(e.message||e));
    return;
  }
  if(PID===pid){ const nm=document.getElementById('projName'); if(nm) nm.textContent = name; }
  renderProjectPicker();
}

async function selectProject(pid){
  const ov=ensureProjOverlay();
  ov.innerHTML='<div style="color:#d7c1ae;font-size:15px;margin-top:60px">Stückliste wird geladen …</div>';
  try{
    PID = pid;
    DATA = await loadProjectLV(pid);
    loadBautagebuch(pid).catch(()=>{});   // Bautagebuch der Baustelle nachladen (nicht blockierend)
    const proj = PROJECTS.find(p=>p.pid===pid);
    const nm = document.getElementById('projName'); if(nm) nm.textContent = proj ? proj.name : pid;
    Object.keys(ST).forEach(k=>delete ST[k]);
    Object.keys(ITEMID).forEach(k=>delete ITEMID[k]);
    Object.keys(IMG_CACHE).forEach(k=>delete IMG_CACHE[k]);
    ACT = '__all';
    buildTabs(); buildPanels();
    ov.style.display='none';
    startData();
  }catch(e){
    alert('Projekt konnte nicht geladen werden: '+(e.message||e));
    renderProjectPicker();
  }
}

async function handleImportFile(file){
  if(!file) return;
  const prev=document.getElementById('impPreview');
  const act=document.getElementById('impActions');
  prev.innerHTML='<div style="color:#d7c1ae;font-size:13px">Datei wird gelesen …</div>';
  act.style.display='none'; PENDING_LV=null;
  try{
    let lv, warn='';
    if(file.name.toLowerCase().endsWith('.pdf')){
      lv = await parsePdfToLV(file);
      warn='PDF-Import: Fabrikat/Typ können unsauber sein. Für beste Qualität die Excel-Vorlage nutzen.';
    } else {
      lv = await parseExcelToLV(file);
    }
    PENDING_LV = lv;
    let nSec=lv.length, nSub=0, nItem=0;
    lv.forEach(s=>{ nSub+=s.subsections.length; s.subsections.forEach(su=>nItem+=su.items.length); });
    if(!nItem) throw new Error('Keine Positionen erkannt. Stimmt das Format/die Spalten?');
    const sample=[];
    lv.forEach(s=>s.subsections.forEach(su=>su.items.forEach(it=>{ if(sample.length<8) sample.push(it); })));
    prev.innerHTML =
      (warn?'<div style="background:#5a4a1a;color:#ffe0a0;padding:8px 10px;border-radius:6px;font-size:12px;margin-bottom:10px">⚠ '+warn+'</div>':'')+
      '<div style="background:#3a3530;border-radius:8px;padding:12px 14px;font-size:13px;color:#fff;margin-bottom:10px">Erkannt: <b>'+nSec+'</b> Bereiche · <b>'+nSub+'</b> Anlagen · <b style="color:#d7c1ae">'+nItem+'</b> Positionen</div>'+

// Gewerk-Text -> Codes ['M','E','S'] (Montage / Elektro / Sanitär), mehrere möglich
function parseGewerk(v){
  const s=String(v==null?'':v).toLowerCase();
  if(!s.trim()) return [];
  const out=[];
  if(/montag|\bm\b/.test(s)) out.push('M');
  if(/elektr|strom|\be\b/.test(s)) out.push('E');
  if(/sanit|wasser|\bs\b/.test(s)) out.push('S');
  return out;
}
const GEWERK_LABEL={M:'Montage',E:'Elektro',S:'Sanitär'};
function gewBadge(gew){
  if(!gew||!gew.length) return '';
  return ' '+gew.map(g=>'<span class="gtag g'+g+'">'+(GEWERK_LABEL[g]||g)+'</span>').join('');
}
// Klickbare Gewerk-Badge je Position (Korrektur falscher Zuordnung aus der Stückliste)
function gewBadgeEditable(pos, gew){
  const inner=(gew&&gew.length)

    : '<span class="gtag gEdit">&#9998; Gewerk</span>';
  return ' <span class="gwedit" onclick="openGewerkChooser(\''+pos+'\')" title="Gewerk korrigieren">'+inner+'</span>';
}

function confirmGewerk(pos){
  const ov=document.getElementById('gwOv'); if(!ov) return;

function setPosGewerk(pos, gewArr){
  let item=null;
  DATA.forEach(s=>s.subsections.forEach(sub=>sub.items.forEach(it=>{ if(it.pos===pos) item=it; })));
  if(!item) return;
  item.gew=gewArr.slice();
  POSGEW[pos]=item.gew;
  const id=sp(pos);
  const card=document.getElementById('C'+id);
  if(card){
    card.dataset.gew=item.gew.join('');
    const imet=card.querySelector('.imet');
    if(imet) imet.innerHTML=(item.fabrikat?'&#127981; '+item.fabrikat.trim():'')+(item.typ?' &nbsp;&#128203; '+item.typ.trim():'')+gewBadgeEditable(item.pos,item.gew);
  }
  applyFieldVisibility(); rc(pos); updProg(pos); upStats(); applyF();
  // Gewerk-Umschalter einblenden, falls die Baustelle dadurch erstmals Gewerke bekommt

// ---- Parser: Zeilen -> LV-Struktur (Hierarchie aus Positionsnummer) ----
function rowsToLV(rows){
  const secMap=new Map(); const order=[];
  rows.forEach(r=>{
    if(!r.pos) return;
    const pos=String(r.pos).trim();
    const parts=pos.split('.').filter(x=>x!=='');
    if(!parts.length) return;
    const secPos=parts[0]+'.';
    const subPos=parts.length>=2 ? parts[0]+'.'+parts[1]+'.' : secPos;
    let sec=secMap.get(secPos);
    if(!sec){ sec={pos:secPos,bez:r.sectName||'',label:(r.sectLabel||secPos.replace(/\./g,'')),subsections:[],_subs:new Map()}; secMap.set(secPos,sec); order.push(sec); }
    if(r.sectName && !sec.bez) sec.bez=r.sectName;
    if(r.sectLabel) sec.label=r.sectLabel;
    let sub=sec._subs.get(subPos);
    if(!sub){ sub={pos:subPos,bez:r.anlage||'',items:[]}; sec._subs.set(subPos,sub); sec.subsections.push(sub); }
    if(r.anlage && !sub.bez) sub.bez=r.anlage;
    sub.items.push({pos:pos, menge:(r.menge==null?'':String(r.menge)).trim(), einh:(r.einh||'').trim(), bez:(r.bez||'').trim(), fabrikat:(r.fabrikat||'').trim(), typ:(r.typ||'').trim(), gew:parseGewerk(r.gewerk)});
  });
  order.forEach(s=>{ delete s._subs; });
  return order;
}
async function parseExcelToLV(file){
  const buf=await file.arrayBuffer();
  const wb=XLSX.read(buf,{type:'array'});
  const ws=wb.Sheets[wb.SheetNames[0]];
  const aoa=XLSX.utils.sheet_to_json(ws,{header:1,blankrows:false,defval:''});
  if(!aoa.length) throw new Error('Leere Tabelle');
  const norm=s=>String(s||'').toLowerCase().trim();
  let hi=-1, map={};
  for(let i=0;i<Math.min(aoa.length,15);i++){
    const row=aoa[i].map(norm);
    const find=keys=>row.findIndex(c=>keys.some(k=>c.includes(k)));
    const m={
      sectLabel:find(['geschoss kurz','kurz','ebene kurz','label']),
      sectName:find(['geschoss','ebene','bereich']),
      anlage:find(['anlage','raum','abschnitt','gruppe']),
      pos:find(['pos']),
      menge:find(['menge','stück','stuck','anzahl','stk']),
      einh:find(['einh','einheit']),
      bez:find(['bezeichn','benennung','artikel']),
      fabrikat:find(['fabrikat','hersteller','marke']),
      typ:find(['typ','modell','art-nr','artikelnr','artikel-nr']),
      gewerk:find(['gewerk','gewerke','arbeit'])
    };
    if(m.pos>=0 && m.bez>=0){ hi=i; map=m; break; }
  }
  if(hi<0) throw new Error('Spaltenüberschriften nicht gefunden (mind. „Pos" und „Bezeichnung"). Bitte die Vorlage verwenden.');
  const rows=[];
  for(let i=hi+1;i<aoa.length;i++){
    const r=aoa[i]; if(!r) continue;
    const get=k=> (map[k]>=0 ? r[map[k]] : '');
    const pos=String(get('pos')||'').trim();
    if(!pos) continue;
    rows.push({ sectLabel:String(get('sectLabel')||'').trim(), sectName:String(get('sectName')||'').trim(),
      anlage:String(get('anlage')||'').trim(), pos, menge:get('menge'), einh:get('einh'),
      bez:get('bez'), fabrikat:get('fabrikat'), typ:get('typ'), gewerk:get('gewerk') });
  }
  const lv=rowsToLV(rows);
  if(!lv.length) throw new Error('Keine gültigen Positionszeilen gefunden.');
  return lv;
}
async function parsePdfToLV(file){
  if(typeof pdfjsLib==='undefined') throw new Error('PDF-Bibliothek nicht geladen');
  pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  let lines=[];
  for(let pn=1;pn<=pdf.numPages;pn++){
    const page=await pdf.getPage(pn);
    const tc=await page.getTextContent();
    const byY={};
    tc.items.forEach(it=>{ const y=Math.round(it.transform[5]); (byY[y]=byY[y]||[]).push({x:it.transform[4],s:it.str}); });
    Object.keys(byY).map(Number).sort((a,b)=>b-a).forEach(y=>{
      const txt=byY[y].sort((a,b)=>a.x-b.x).map(o=>o.s).join(' ').replace(/\s+/g,' ').trim();
      if(txt) lines.push(txt);
    });
  }
  const reItem=/^(\d{2}\.\d{2}\.\d{2}\.\d{2}\.\d{2}\.[a-z]?)\s+([\d.,]+)\s+(\S+)\s+(.*)$/;
  const reSub=/^(\d{2}\.\d{2}\.)\s+(.+)$/;
  const reSec=/^(\d{2}\.)\s+(.+)$/;
  const rows=[]; let curSecName='', curAnlage='';
  lines.forEach(l=>{
    let m;
    if(m=l.match(reItem)){ rows.push({sectLabel:'', sectName:curSecName, anlage:curAnlage, pos:m[1], menge:m[2].replace(',','.'), einh:m[3], bez:m[4], fabrikat:'', typ:''}); }
    else if(m=l.match(reSub)){ curAnlage=m[2].trim(); }
    else if(m=l.match(reSec)){ curSecName=m[2].trim(); }
  });
  const lv=rowsToLV(rows);
  if(!lv.length) throw new Error('Keine Positionen im PDF erkannt.');
  return lv;
}
